<header class="ar-header">
  <div class="ar-header__inner">
    <div class="ar-header__left">
      <a href="{{ site.shop_url }}">Shop</a>
      <a href="{{ site.shop_url }}/about">About</a>
    </div>
    <button class="ar-menu-toggle" onclick="toggleMenu()" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
    <a href="{{ '/' | relative_url }}" class="ar-header__logo">AU RÊVE</a>
    <div class="ar-header__right">
      {% assign current_lang = page.lang | default: "kr" %}
      {% if current_lang == "kr" %}
        <button class="ar-lang-toggle" onclick="switchLang('en')">EN</button>
      {% else %}
        <button class="ar-lang-toggle" onclick="switchLang('kr')">KR</button>
      {% endif %}
    </div>
  </div>
</header>
<nav class="ar-mobile-menu" id="mobileMenu">
  <a href="{{ site.shop_url }}">Shop</a>
  <a href="{{ site.shop_url }}/about">About</a>
  <a href="{{ '/' | relative_url }}">Journal</a>
  <a href="{{ site.instagram_url }}" target="_blank">Instagram</a>
</nav>
